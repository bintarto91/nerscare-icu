<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - AI-Assisted Assessment ICU</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            padding: 24px;
        }

        .box {
            max-width: 460px;
            background: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, .12);
            text-align: center;
        }

        .icon {
            width: 74px;
            height: 74px;
            border-radius: 8px;
            background: #0b6f73;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 22px;
        }

        button {
            border: 0;
            background: #0b6f73;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">📶</div>
        <h1>Koneksi Internet Terputus</h1>
        <p>
            Halaman tidak dapat dimuat karena perangkat sedang offline.
            Silakan cek koneksi internet lalu coba kembali.
        </p>
        <button onclick="window.location.reload()">Coba Lagi</button>
    </div>
</body>
</html>
