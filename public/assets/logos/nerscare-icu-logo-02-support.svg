<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NersCare ICU support logo</title>
  <desc id="desc">A warm support-focused logo for ICU loneliness assessment and family education.</desc>
  <defs>
    <linearGradient id="supportGradient" x1="40" y1="30" x2="184" y2="182" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5A0"/>
      <stop offset="1" stop-color="#0C4A5A"/>
    </linearGradient>
    <filter id="supportShadow" x="0" y="0" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0C4A5A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#supportShadow)">
    <rect x="36" y="34" width="150" height="150" rx="46" fill="url(#supportGradient)"/>
    <circle cx="91" cy="96" r="18" fill="#E6FFFB"/>
    <circle cx="131" cy="96" r="18" fill="#E6FFFB"/>
    <path d="M61 145C67 125 77 116 91 116C105 116 115 126 121 145" stroke="#E6FFFB" stroke-width="8" stroke-linecap="round"/>
    <path d="M101 145C107 125 117 116 131 116C145 116 155 126 161 145" stroke="#E6FFFB" stroke-width="8" stroke-linecap="round"/>
    <path d="M111 76C116 65 133 65 138 77C145 92 127 106 111 120C95 106 77 92 84 77C89 65 106 65 111 76Z" fill="#F8B84E"/>
  </g>

  <text x="226" y="92" fill="#0F2530" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="0">NersCare ICU</text>
  <text x="228" y="134" fill="#0B6F73" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" letter-spacing="0">Loneliness Assessment &amp; Edukasi</text>
  <text x="228" y="166" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="0">Membantu perawat dan keluarga memahami dukungan pasien ICU</text>
</svg>
